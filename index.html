<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marauder App - Strands of Fate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="parchment-container">
        <header class="ornamental-header">
            <h1 class="main-title">Strands of Fate</h1>
            <p class="sub-title">I solemnly swear...</p>
        </header>

        <section id="perfil" class="app-section active">
            <div style="text-align:center; margin: 20px 0;">
                <img id="char-img-display" src="https://via.placeholder.com/150" style="width:120px; height:120px; border-radius:50%; border:3px solid var(--gold);">
                <input type="text" id="char-name" class="name-input" placeholder="Nombre del Mago" style="text-align:center;">
            </div>
            <div class="input-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <input type="text" id="char-concept" placeholder="Concepto">
                <input type="number" id="recovery-val" placeholder="Recuperación" oninput="updateSkillBudget()">
            </div>
            <h3>Aspectos</h3>
            <div id="aspects-list">
                <input type="text" class="aspect-input" placeholder="Aspecto Principal">
                <input type="text" class="aspect-input" placeholder="Vínculo">
                <input type="text" class="aspect-input" placeholder="Problema">
            </div>
        </section>

        <section id="magia" class="app-section">
            <h2>Artes Arcanas</h2>
            <div style="font-family:'MedievalSharp'; margin-bottom:10px;">Esencia Libre: <span id="skill-budget">0</span></div>
            <div id="skills-dynamic-list"></div>
            <button onclick="addSkill()" style="width:100%; margin-top:15px;">+ Aprender Arte</button>
            <h2 style="margin-top:30px;">Proezas</h2>
            <textarea id="stunts-area" style="height:150px;"></textarea>
        </section>

        <section id="lanzar" class="app-section">
            <div class="roll-altar">
                <h2>Esfera de Adivinación</h2>
                <select id="skill-selector"></select>
                <button onclick="executeSelectedRoll()" style="width:100%; margin-top:10px;">✨ Invocar Destino</button>
                <div id="dice-result-v2">
                    <div class="final-score">?</div>
                </div>
            </div>
            <h3>Historial</h3>
            <ul id="roll-history" style="list-style:none; padding:0; font-size:0.9rem;"></ul>
        </section>

        <section id="ajustes" class="app-section">
            <h2>Ajustes del Pergamino</h2>
            <label>Imagen del Espejo (URL):</label>
            <input type="text" id="char-img-url" onchange="updateImage()">
            <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
                <button onclick="exportCharacter()">📜 Guardar en Dispositivo</button>
                <label style="background:var(--gold); color:white; padding:12px; text-align:center; border-radius:8px; cursor:pointer;">
                    📖 Cargar Archivo
                    <input type="file" id="importFile" accept=".json" onchange="importCharacter(event)" style="display:none">
                </label>
            </div>
        </section>

        <nav class="mobile-nav">
            <a href="#" class="nav-item active" onclick="showSection('perfil', this)">👤<span>Perfil</span></a>
            <a href="#" class="nav-item" onclick="showSection('magia', this)">🪄<span>Magia</span></a>
            <a href="#" class="nav-item" onclick="showSection('lanzar', this)">🎲<span>Dados</span></a>
            <a href="#" class="nav-item" onclick="showSection('ajustes', this)">⚙️<span>Ajustes</span></a>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
