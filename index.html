<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strands of Fate 2.0 - Edición Arcana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="parchment-container">
        <nav class="magical-toolbar">
            <div class="file-management">
                <button onclick="exportCharacter()">📜 Exportar</button>
                <label class="custom-file-upload">
                    <input type="file" id="importFile" accept=".json" onchange="importCharacter(event)">
                    📖 Cargar
                </label>
            </div>
            <div class="fate-points-shield">
                <span>Puntos Fate:</span>
                <button onclick="updateFate(-1)">-</button>
                <span id="fate-display">3</span>
                <button onclick="updateFate(1)">+</button>
            </div>
        </nav>

        <header class="character-header">
            <div class="avatar-frame">
                <img id="char-img-display" src="https://via.placeholder.com/150?text=Avatar" alt="Imagen">
                <input type="text" id="char-img-url" placeholder="URL Imagen" onchange="updateImage()">
            </div>
            <div class="identity-fields">
                <input type="text" id="char-name" class="name-input" placeholder="Nombre del Personaje">
                <div class="sub-fields">
                    <input type="text" id="char-age" placeholder="Edad / Sangre">
                    <input type="text" id="char-concept" placeholder="Concepto Principal">
                    <input type="number" id="recovery-val" placeholder="Recup." oninput="updateSkillBudget()">
                    <div class="budget-info">Puntos: <span id="skill-budget">0</span></div>
                </div>
            </div>
        </header>

        <div class="main-content">
            <aside class="left-column">
                <section class="box-section">
                    <h2>Aspectos y Proezas</h2>
                    <div id="aspects-list">
                        <input type="text" class="aspect-input" placeholder="Aspecto Definidor">
                        <input type="text" class="aspect-input" placeholder="Aspecto Narrativo">
                        <input type="text" class="aspect-input" placeholder="Aspecto Narrativo">
                        <input type="text" class="aspect-input" placeholder="Debilidad / Problema">
                        <textarea id="stunts-area" class="stunt-input" placeholder="✨ Proeza: Describe aquí tu habilidad especial..."></textarea>
                    </div>
                </section>

                <section class="box-section">
                    <h2>Habilidades Aprendidas</h2>
                    <div id="skills-dynamic-list"></div>
                    <button onclick="addSkill()" class="btn-secondary">+ Aprender Habilidad</button>
                </section>
            </aside>

            <main class="right-column">
                <section class="box-section roll-altar">
                    <h2>Altar de Tiradas</h2>
                    <div class="roll-controls">
                        <select id="skill-selector">
                            <option value="0">Tirada Simple (+0)</option>
                            </select>
                        <button onclick="executeSelectedRoll()">✨ Lanzar</button>
                    </div>
                    <div id="dice-result-v2" class="result-box">
                        <p>El destino aguarda...</p>
                    </div>
                    <ul id="roll-history"></ul>
                </section>

                <section class="box-section">
                    <h2>Estado y Daño</h2>
                    <div class="stress-track">
                        <span>Físico:</span>
                        <input type="checkbox"> <input type="checkbox"> <input type="checkbox"> <input type="checkbox">
                    </div>
                    <div class="stress-track">
                        <span>Mental:</span>
                        <input type="checkbox"> <input type="checkbox"> <input type="checkbox"> <input type="checkbox">
                    </div>
                    <div class="consequences-list">
                        <h3>Consecuencias</h3>
                        <input type="text" placeholder="Leve (2): Ej. Raspón">
                        <input type="text" placeholder="Moderada (4): Ej. Brazo roto">
                        <input type="text" placeholder="Grave (6): Ej. Trauma mágico">
                    </div>
                </section>

                <section class="box-section">
                    <h2>Inventario Mágico</h2>
                    <div id="items-list"></div>
                    <button onclick="addItem()" class="btn-secondary">+ Nuevo Objeto</button>
                </section>
            </main>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
