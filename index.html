<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marauder App v6</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="main-title">Strands of Fate</h1>
        </header>

        <section id="perfil" class="app-section active">
            <div class="avatar-section">
                <img id="char-img-display" src="https://via.placeholder.com/150" class="avatar-img">
                <input type="text" id="char-name" class="name-input" placeholder="Nombre">
            </div>
            
            <div class="aspects-box">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>Vínculos y Esencia</h2>
                    <button onclick="addAspect()" class="btn-add-small">+</button>
                </div>
                <div id="aspects-dynamic-list">
                    </div>
            </div>
        </section>

        <section id="magia" class="app-section">
            <div class="section-header">
                <h2>Artes Arcanas</h2>
                <div class="budget-info">Esencia: <span id="skill-budget">0</span></div>
            </div>
            <div id="skills-dynamic-list"></div>
            <button onclick="addSkill()" class="btn-roll" style="background:var(--gold)">+ Aprender Arte</button>
        </section>

        <section id="lanzar" class="app-section">
            <div class="roll-card">
                <select id="skill-selector"></select>
                <button onclick="executeSelectedRoll()" class="btn-roll">✨ INVOCAR</button>
                <div id="dice-result-v2" class="result-display"><div class="final-score">?</div></div>
            </div>

            <div class="status-grid-large" style="margin-top:20px">
                <div class="track-group">
                    <strong>Estrés Físico</strong>
                    <div class="checks">
                        <input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox">
                    </div>
                    <input type="text" placeholder="Consecuencia Física Leve">
                    <input type="text" placeholder="Consecuencia Física Grave">
                </div>
                <div class="track-group">
                    <strong>Estrés Mental</strong>
                    <div class="checks">
                        <input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox">
                    </div>
                    <input type="text" placeholder="Consecuencia Mental Leve">
                    <input type="text" placeholder="Consecuencia Mental Grave">
                </div>
            </div>
        </section>

        <nav class="tab-bar">
            <button class="tab-item active" onclick="showTab('perfil', this)">
                <i data-lucide="user"></i><span>Perfil</span>
            </button>
            <button class="tab-item" onclick="showTab('magia', this)">
                <i data-lucide="wand-2"></i><span>Magia</span>
            </button>
            <button class="tab-item" onclick="showTab('lanzar', this)">
                <i data-lucide="dices"></i><span>Juego</span>
            </button>
        </nav>
    </div>

    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
