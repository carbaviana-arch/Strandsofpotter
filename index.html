<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strands of Fate 2.0 - Pergamino Mágico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="parchment-container">
        <nav class="magical-toolbar">
            <div class="file-management">
                <button onclick="exportCharacter()" title="Guardar en archivo">📜 Exportar JSON</button>
                <label class="custom-file-upload">
                    <input type="file" id="importFile" accept=".json" onchange="importCharacter(event)">
                    📖 Cargar Archivo
                </label>
            </div>
            <div class="fate-points-shield">
                <span class="label">Puntos Fate:</span>
                <button onclick="updateFate(-1)">-</button>
                <span id="fate-display">3</span>
                <button onclick="updateFate(1)">+</button>
            </div>
        </nav>

        <header class="character-header">
            <div class="avatar-frame">
                <img id="char-img-display" src="https://via.placeholder.com/150?text=Avatar" alt="Imagen del personaje">
                <input type="text" id="char-img-url" placeholder="URL de la imagen" onchange="updateImage()">
            </div>
            <div class="identity-fields">
                <input type="text" id="char-name" class="name-input" placeholder="Nombre del Héroe/Heroína">
                <div class="sub-fields">
                    <input type="text" id="char-age" placeholder="Edad / Origen">
                    <input type="text" id="char-concept" placeholder="Concepto Principal">
                    <input type="text" id="char-job" placeholder="Ocupación / Rango">
                    <input type="number" id="recovery-val" placeholder="Recuperación">
                </div>
            </div>
        </header>

        <div class="main-content">
            <aside class="left-column">
                <section class="box-section">
                    <h2>Aspectos</h2>
                    <div id="aspects-list">
                        <textarea class="aspect-input" placeholder="Aspecto Definidor"></textarea>
                        <textarea class="aspect-input" placeholder="Aspecto Narrativo"></textarea>
                        <textarea class="aspect-input" placeholder="Aspecto Narrativo"></textarea>
                        <textarea class="aspect-input" placeholder="Aspecto Narrativo"></textarea>
                        <textarea class="aspect-input" placeholder="Debilidad / Problema"></textarea>
                    </div>
                </section>

                <section class="box-section">
                    <h2>Inventario Mágico</h2>
                    <div id="items-list"></div>
                    <button onclick="addItem()" class="btn-add-item">+ Agregar Objeto</button>
                </section>
            </aside>

            <main class="right-column">
                <section class="box-section roll-altar">
                    <h2>Altar de Tiradas</h2>
                    <div class="roll-controls">
                        <select id="skill-selector">
                            <option value="5">Excelente (+5)</option>
                            <option value="4">Enorme (+4)</option>
                            <option value="3">Grande (+3)</option>
                            <option value="2">Bueno (+2)</option>
                            <option value="1">Normal (+1)</option>
                            <option value="0">Mediocre (+0)</option>
                        </select>
                        <button id="main-roll-btn" onclick="executeSelectedRoll()">✨ Lanzar</button>
                    </div>
                    
                    <div id="dice-result-v2" class="result-box">
                        <p class="placeholder-text">El destino espera...</p>
                    </div>

                    <div class="history-container">
                        <h3>Últimas Crónicas</h3>
                        <ul id="roll-history">
                            </ul>
                    </div>
                </section>

                <section class="box-section status-tracks">
                    <h2>Estado y Daño</h2>
                    <div class="stress-track">
                        <span>Estrés Físico:</span>
                        <div class="checkbox-group">
                            <input type="checkbox"> <input type="checkbox"> <input type="checkbox"> <input type="checkbox">
                        </div>
                    </div>
                    <div class="stress-track">
                        <span>Estrés Mental:</span>
                        <div class="checkbox-group">
                            <input type="checkbox"> <input type="checkbox"> <input type="checkbox"> <input type="checkbox">
                        </div>
                    </div>
                </section>
            </main>
        </div>

        <section class="box-section">
            <h2>Notas de Sesión</h2>
            <textarea id="notes-area" rows="6" placeholder="Escribe aquí tus proezas..."></textarea>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
